<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenGenerator - Premium Token Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Global navbar already has primary styling */

        .hero {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 2rem;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -0.025em;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 700px;
            margin: 0 auto 2.5rem;
        }

        .main-content {
            max-width: 1000px;
            margin: 0 auto 6rem;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-4px);
        }

        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .user-welcome {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .user-welcome span {
            color: var(--primary);
            font-weight: 600;
        }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--glass-border);
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            .navbar {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <header class="hero">
        <h1>Secure. Simple. <br><span style="color: var(--primary);">Authentic.</span></h1>
        <p>The next generation of product authentication. Generate, verify, and secure your products with cryptographic
            tokens.</p>

        <div th:if="${#authorization.expression('isAuthenticated()')}">
            <div class="user-welcome">
                Welcome back, <span th:text="${#authentication.name}">User</span>!
            </div>
        </div>
    </header>

    <!-- Duplicate content removed as requested -->

    <footer>
        &copy; 2026 TokenGenerator. Designed for visual excellence and security.
    </footer>
</body>

</html>
