<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>My Profile - TokenGenerator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .profile-row:last-child {
            border-bottom: none;
        }

        .label {
            color: var(--text-dim);
            font-size: 0.875rem;
        }

        .value {
            font-weight: 600;
        }

        .api-key-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            font-family: monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-outline {
            border: 1px solid var(--primary);
            color: var(--primary);
            background: transparent;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/header :: navbar}"></div>
    <div class="container">
        <div class="header">
            <h1>My Profile</h1>
            <p style="color: var(--text-dim);">Manage your account and API access</p>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Account Information</h2>
            <div class="profile-row">
                <span class="label">Username</span>
                <span class="value" th:text="${account.username}">username</span>
            </div>
            <div class="profile-row">
                <span class="label">Email</span>
                <span class="value" th:text="${account.email}">email@example.com</span>
            </div>
            <div class="profile-row">
                <span class="label">Status</span>
                <span class="value" style="color: #10b981;">Active</span>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 0.5rem; font-size: 1.25rem;">API Authentication</h2>
            <p style="color: var(--text-dim); font-size: 0.875rem; margin-bottom: 1.5rem;">
                Use this API key to authenticate external requests.
                Keep it secret!
            </p>

            <div class="label">Your API Key</div>
            <div class="api-key-box">
                <span id="apiKey" th:text="${account.apiKey}">API-KEY-GOES-HERE</span>
                <button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;"
                    onclick="copyApiKey()">Copy</button>
            </div>

            <form th:action="@{/profile/api-key/regenerate}" method="post" style="margin-top: 1.5rem;">
                <button type="submit" class="btn btn-danger"
                    onclick="return confirm('새로운 API 키를 발급하시겠습니까? 기존 키는 더 이상 작동하지 않습니다.')">
                    Regenerate API Key
                </button>
            </form>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <a th:href="@{/products}" style="color: var(--primary); text-decoration: none; font-size: 0.875rem;">&larr;
                Back to Products</a>
        </div>
    </div>

    <script>
        function copyApiKey() {
            const apiKey = document.getElementById('apiKey').innerText;
            navigator.clipboard.writeText(apiKey).then(() => {
                alert('API Key copied to clipboard!');
            });
        }
    </script>
</body>

</html>
