<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tokens Issued - TokenGenerator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem;
        }

        .success-banner {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .header {
            margin-bottom: 3rem;
            text-align: center;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
        }

        .product-info {
            color: var(--text-dim);
            margin-top: 0.5rem;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
        }

        .qr-section {
            text-align: center;
        }

        .qr-section img {
            background: white;
            padding: 1rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 200px;
            margin-bottom: 1rem;
        }

        .qr-label {
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        .token-section h3 {
            margin-bottom: 1rem;
            font-size: 1.125rem;
        }

        .token-list {
            max-height: 400px;
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid var(--border);
        }

        .token-item {
            font-family: monospace;
            font-size: 0.875rem;
            padding: 0.5rem;
            border-bottom: 1px solid var(--border);
            word-break: break-all;
        }

        .token-item:last-child {
            border-bottom: none;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            margin-top: 1rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-outline {
            border: 1px solid var(--primary);
            color: var(--primary);
            background: transparent;
        }

        .actions {
            margin-top: 3rem;
            text-align: center;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/header :: navbar}"></div>
    <div class="container">
        <div class="success-banner">
            ✨ Successfully issued <span th:text="${tokens.size()}">0</span> tokens!
        </div>

        <div class="header">
            <h1 th:text="${product.name}">Product Name</h1>
            <div class="product-info">
                Version: <span th:text="${version.versionName}">v1.0</span>
            </div>
        </div>

        <div class="result-grid">
            <div class="card qr-section">
                <h3>Version QR Code</h3>
                <p class="qr-label" style="margin-bottom: 1rem;">Use this QR to access the verification page for this
                    version.</p>
                <img th:src="'data:image/png;base64,' + ${qrCode}" alt="QR Code">
                <div style="font-size: 0.75rem; color: var(--text-dim); word-break: break-all;">
                    URL: <span th:text="${verificationUrl}">url</span>
                </div>
            </div>

            <div class="card token-section">
                <h3>Issued Tokens</h3>
                <div class="token-list">
                    <div th:each="token : ${tokens}" class="token-item">
                        <div style="display: flex; gap: 1rem; align-items: center; justify-content: space-between;">
                            <span th:text="${token}" style="font-weight: 600;">token-value</span>
                            <button class="btn btn-primary"
                                style="padding: 0.25rem 0.5rem; font-size: 0.75rem; margin-top: 0;"
                                th:attr="data-token=${token}" onclick="copyToken(this)">Copy</button>
                        </div>
                    </div>
                </div>
                <p class="qr-label" style="margin-top: 1rem;">These identifiers are now active for verification.</p>
            </div>
        </div>

        <div class="actions">
            <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-primary">Back to Version Dashboard</a>
            <a th:href="@{/products}" class="btn btn-outline">All Products</a>
        </div>
    </div>

    <script>
        function copyToken(btn) {
            const text = btn.getAttribute('data-token');
            navigator.clipboard.writeText(text).then(() => {
                alert('Token copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }
    </script>
</body>

</html>
