<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Products - TokenGenerator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-top: 1rem;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            white-space: nowrap;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-outline {
            border: 1px solid var(--primary);
            color: var(--primary);
            background: transparent;
        }

        .btn-success {
            background-color: #10b981;
            color: white;
            padding: 0.6rem 1.2rem;
            font-size: 0.875rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: var(--glass);
        }

        .field-tag {
            display: inline-block;
            background: var(--glass);
            padding: 0.2rem 0.5rem;
            border-radius: 0.3rem;
            font-size: 0.75rem;
            margin: 0.1rem;
        }

        .logout-form button {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.875rem;
            text-decoration: underline;
        }

        .logout-form button:hover {
            color: var(--text-main);
        }

        .nav-btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .nav-btn-primary {
            background-color: var(--primary);
            color: white;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/header :: navbar}"></div>
    <div class="container">
        <div style="margin-bottom: 2rem;">
            <h1>My Products</h1>
            <p style="color: var(--text-dim);">Manage your product line and issue authenticity tokens.</p>
            <div style="margin-top: 1rem;">
                <a th:href="@{/products/new}" class="nav-btn nav-btn-primary">Register New Product</a>
            </div>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Required Fields</th>
                        <th style="width: 150px; text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td style="font-weight: 600;" th:text="${product.name}">Product Name</td>
                        <td style="color: var(--text-dim);" th:text="${product.description}">Description</td>
                        <td>
                            <span th:each="field : ${product.requiredFields}" class="field-tag"
                                th:text="${field}">field</span>
                        </td>
                        <td style="text-align: center;">
                            <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-success">Detail & Issue</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
