<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TokenGenerator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin: 4rem auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        input:read-only {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn {
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-size: 0.9rem;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            margin-top: 1rem;
            font-size: 1rem;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .btn-outline:hover:not(:disabled) {
            background: var(--glass);
            border-color: var(--primary);
        }

        .status-msg {
            font-size: 0.8rem;
            margin-top: 0.4rem;
            display: none;
        }

        .status-success {
            color: var(--success);
        }

        .status-error {
            color: #ef4444;
        }

        .footer-link {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/header :: navbar}"></div>
    <div class="container">
        <div class="header">
            <a th:href="@{/}" class="logo"
                style="text-decoration: none; font-size: 2.5rem; display: block; text-align: center; margin-bottom: 1rem;">TokenGenerator</a>
            <p>Join the next generation of authentication</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                    <button type="button" id="btnSendCode" class="btn btn-outline">Send Code</button>
                </div>
                <div id="emailMsg" class="status-msg"></div>
            </div>

            <div class="form-group">
                <div class="input-group">
                    <input type="text" id="code" placeholder="Verification Code" required>
                    <button type="button" id="btnVerifyCode" class="btn btn-outline">Verify</button>
                </div>
                <div id="codeMsg" class="status-msg"></div>
            </div>

            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <button type="submit" id="btnRegister" class="btn btn-primary" disabled>Complete Registration</button>
        </form>

        <div class="footer-link">
            Already have an account? <a th:href="@{/login}" class="btn btn-outline"
                style="width: auto; padding: 0.5rem 1rem;">Sign In</a>
        </div>
    </div>

    <script th:inline="javascript">
        const btnSendCode = document.getElementById('btnSendCode');
        const btnVerifyCode = document.getElementById('btnVerifyCode');
        const btnRegister = document.getElementById('btnRegister');
        const emailInput = document.getElementById('email');
        const codeInput = document.getElementById('code');
        const emailMsg = document.getElementById('emailMsg');
        const codeMsg = document.getElementById('codeMsg');

        let isEmailVerified = false;

        function showMsg(el, text, isError) {
            el.textContent = text;
            el.style.display = 'block';
            el.className = 'status-msg ' + (isError ? 'status-error' : 'status-success');
        }

        btnSendCode.addEventListener('click', async () => {
            const email = emailInput.value;
            if (!email) {
                showMsg(emailMsg, '이메일을 입력해주세요.', true);
                return;
            }

            btnSendCode.disabled = true;
            showMsg(emailMsg, '코드를 전송 중입니다...', false);

            try {
                const response = await fetch(/*[[@{/register/send-code}]]*/ '/register/send-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.ok) {
                    showMsg(emailMsg, '인증 코드가 전송되었습니다.', false);
                    let timeLeft = 60;
                    const timer = setInterval(() => {
                        btnSendCode.textContent = `Retry (${timeLeft}s)`;
                        if (timeLeft <= 0) {
                            clearInterval(timer);
                            btnSendCode.disabled = false;
                            btnSendCode.textContent = 'Send Code';
                        }
                        timeLeft--;
                    }, 1000);
                } else {
                    const error = await response.text();
                    showMsg(emailMsg, error, true);
                    btnSendCode.disabled = false;
                }
            } catch (err) {
                showMsg(emailMsg, '오류가 발생했습니다.', true);
                btnSendCode.disabled = false;
            }
        });

        btnVerifyCode.addEventListener('click', async () => {
            const email = emailInput.value;
            const code = codeInput.value;

            if (!code) {
                showMsg(codeMsg, '코드를 입력해주세요.', true);
                return;
            }

            try {
                const response = await fetch(/*[[@{/register/verify-code}]]*/ '/register/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });

                if (response.ok) {
                    showMsg(codeMsg, '인증에 성공했습니다.', false);
                    isEmailVerified = true;
                    emailInput.readOnly = true;
                    codeInput.readOnly = true;
                    btnSendCode.disabled = true;
                    btnVerifyCode.disabled = true;
                    btnRegister.disabled = false;
                } else {
                    showMsg(codeMsg, '인증번호가 일치하지 않습니다.', true);
                }
            } catch (err) {
                showMsg(codeMsg, '오류가 발생했습니다.', true);
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!isEmailVerified) return;

            const payload = {
                username: document.getElementById('username').value,
                email: emailInput.value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch(/*[[@{/register}]]*/ '/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('회원가입이 완료되었습니다!');
                    window.location.href = /*[[@{/login}]]*/ '/login';
                } else {
                    const error = await response.text();
                    alert('회원가입 실패: ' + error);
                }
            } catch (err) {
                alert('오류가 발생했습니다.');
            }
        });
    </script>
</body>

</html>
